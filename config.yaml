# 監視対象ソース定義
#
# 【設計方針】
# 公式RSSを最優先。HTMLスクレイピングは構造変更で容易に壊れるため最小限。
#
# 【除外したソースと理由】
# - Meta for Developers Blog / Graph API Changelog: bot対策で400エラー固定。代替として about.fb.com を使用
# - X Developer Changelog (docs.x.com): React SPA でJS未実行では取得不可
# - TikTok Newsroom RSS: 2025年頃にRSSが廃止されHTMLへ置換、SPA化で取得不可
# - TikTok Developers Changelog / API for Business Blog: SPA化で取得不可
#
# 【セレクタ保守】
# HTMLソースが0件継続する場合は対象サイトの構造変化を疑い、本ファイルを更新。

sources:
  # ===== Meta（公式コーポレートRSS）=====
  - name: Meta Newsroom (about.fb.com)
    platform: Meta
    type: rss
    url: https://about.fb.com/feed/

  - name: Engineering at Meta
    platform: Meta
    type: rss
    url: https://engineering.fb.com/feed/

  # ===== X (Twitter) =====
  - name: X Developer Community Announcements
    platform: X
    type: rss
    url: https://devcommunity.x.com/c/announcements/22.rss

  # ===== YouTube =====
  - name: YouTube Official Blog
    platform: YouTube
    type: rss
    url: https://blog.youtube/rss/

  - name: YouTube Data API Revision History
    platform: YouTube
    type: html
    url: https://developers.google.com/youtube/v3/revision_history
    item_selector: h3
    title_selector: ""
    link_selector: ""
    base_url: https://developers.google.com/youtube/v3/revision_history

  # ===== Google Ads =====
  - name: Google Ads API Release Notes
    platform: Google Ads
    type: html
    url: https://developers.google.com/google-ads/api/docs/release-notes
    item_selector: h2
    title_selector: ""
    link_selector: ""
    base_url: https://developers.google.com/google-ads/api/docs/release-notes
