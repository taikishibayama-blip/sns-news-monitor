name: SNS News Monitor

on:
  schedule:
    # 3時間おきに速報チェック
    - cron: '0 */3 * * *'
    # 毎週金曜 17:00 JST = 08:00 UTC に週次レポート
    - cron: '0 8 * * 5'
  workflow_dispatch:
    inputs:
      mode:
        description: '実行モード'
        required: true
        default: 'check'
        type: choice
        options:
          - check
          - weekly

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 8 * * 5" ]; then
            echo "mode=weekly" >> "$GITHUB_OUTPUT"
          else
            echo "mode=check" >> "$GITHUB_OUTPUT"
          fi

      - name: Run monitor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python main.py ${{ steps.mode.outputs.mode }}

      - name: Commit state and reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen.json weekly_buffer.json reports/ 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "Update state and reports [skip ci]"
            git push
          else
            echo "no changes to commit"
          fi
